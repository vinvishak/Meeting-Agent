# Alembic configuration for meeting-agent
# Run migrations from the project root: alembic upgrade head

[alembic]
script_location = src/storage/migrations

# sqlalchemy.url is set dynamically in env.py from src.config.Settings
# sqlalchemy.url = sqlite+aiosqlite:///./data/agent.db

prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
